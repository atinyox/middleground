<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#334155" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Connecting lines between pins and midpoint -->
  <line x1="390" y1="230" x2="600" y2="290" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
  <line x1="810" y1="230" x2="600" y2="290" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Left pin -->
  <g transform="translate(390, 180)">
    <ellipse cx="0" cy="56" rx="10" ry="4" fill="#000" opacity="0.3"/>
    <path d="M0 0 C-22 0 -22 33 0 33 C22 33 22 0 0 0Z" fill="#3b82f6"/>
    <path d="M0 33 L0 54" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="13" r="7" fill="white" opacity="0.9"/>
  </g>

  <!-- Right pin -->
  <g transform="translate(810, 180)">
    <ellipse cx="0" cy="56" rx="10" ry="4" fill="#000" opacity="0.3"/>
    <path d="M0 0 C-22 0 -22 33 0 33 C22 33 22 0 0 0Z" fill="#3b82f6"/>
    <path d="M0 33 L0 54" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="13" r="7" fill="white" opacity="0.9"/>
  </g>

  <!-- ════════════════════════════════ -->
  <!-- FOOD ICONS (all above y ≈ 345)  -->
  <!-- ════════════════════════════════ -->

  <!-- 1. Burger — upper-left area, (508, 148) -->
  <g transform="translate(508, 148) rotate(-13)" opacity="0.88">
    <path d="M-20,-10 Q-21,-30 0,-32 Q21,-30 20,-10 Z" fill="#d97706"/>
    <ellipse cx="-7" cy="-28" rx="3" ry="1.5" fill="#fef3c7" transform="rotate(-20,-7,-28)"/>
    <ellipse cx="5"  cy="-30" rx="3" ry="1.5" fill="#fef3c7" transform="rotate(10,5,-30)"/>
    <ellipse cx="13" cy="-23" rx="2.5" ry="1.5" fill="#fef3c7" transform="rotate(5,13,-23)"/>
    <ellipse cx="0" cy="-7" rx="18" ry="3" fill="#dc2626" opacity="0.85"/>
    <ellipse cx="0" cy="-2" rx="21" ry="4" fill="#16a34a"/>
    <ellipse cx="0" cy="5"  rx="18" ry="5" fill="#78350f"/>
    <ellipse cx="0" cy="13" rx="20" ry="7" fill="#d97706"/>
  </g>

  <!-- 2. Ramen bowl — upper-right area, (668, 150) -->
  <g transform="translate(668, 150) rotate(7)" opacity="0.88">
    <line x1="-6" y1="-30" x2="4"  y2="8"  stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2"  y1="-30" x2="14" y2="8"  stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-22,0 Q-24,24 0,27 Q24,24 22,0 Z" fill="#e2e8f0"/>
    <ellipse cx="0" cy="0" rx="22" ry="7" fill="#cbd5e1"/>
    <ellipse cx="0" cy="2" rx="17" ry="5" fill="#b45309" opacity="0.75"/>
    <path d="M-13,-1 Q-7,-7 0,-1 Q7,5 13,-1"   stroke="#fef9c3" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M-11,5  Q-5,-1 1,5  Q7,11 13,5"   stroke="#fef9c3" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 3. Ice cream cone — right side, (750, 300) -->
  <g transform="translate(750, 300) rotate(11)" opacity="0.88">
    <polygon points="0,30 -15,-6 15,-6" fill="#ca8a04"/>
    <line x1="-15" y1="-6" x2="0"  y2="30" stroke="#a16207" stroke-width="1.2"/>
    <line x1="15"  y1="-6" x2="0"  y2="30" stroke="#a16207" stroke-width="1.2"/>
    <line x1="-10" y1="10" x2="10" y2="10" stroke="#a16207" stroke-width="1"/>
    <circle cx="0" cy="-20" r="16" fill="#fca5a5"/>
    <circle cx="-5" cy="-26" r="4" fill="white" opacity="0.3"/>
    <circle cx="2" cy="-38" r="13" fill="#6ee7b7"/>
    <circle cx="-3" cy="-44" r="3.5" fill="white" opacity="0.3"/>
  </g>

  <!-- 4. Chinese takeout box — left side, (448, 300) -->
  <g transform="translate(448, 300) rotate(-9)" opacity="0.88">
    <path d="M-9,-22 Q0,-40 9,-22" stroke="#9ca3af" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M-8,-21 Q-3,-30 2,-21"  stroke="#fef9c3" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M0,-21  Q5,-28 10,-21" stroke="#fef9c3" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-15,-22 L15,-22 L20,22 L-20,22 Z" fill="#ef4444"/>
    <path d="M-15,-22 L15,-22 L10,-8 L-10,-8 Z" fill="#fca5a5"/>
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke="#ef4444" stroke-width="1"/>
  </g>

  <!-- 5. Pizza slice — far left, clear of pins and text, (362, 295) -->
  <g transform="translate(362, 295) rotate(22)" opacity="0.88">
    <path d="M0,-28 L-23,20 Q0,32 23,20 Z" fill="#d97706"/>
    <line x1="-18" y1="18" x2="-12" y2="14" stroke="#b45309" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="12"  y1="14" x2="18"  y2="18" stroke="#b45309" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,-21 L-16,15 Q0,24 16,15 Z" fill="#fde68a"/>
    <circle cx="0"  cy="-7" r="5.5" fill="#dc2626"/>
    <circle cx="-9" cy="7"  r="4.5" fill="#dc2626"/>
    <circle cx="9"  cy="4"  r="4.5" fill="#dc2626"/>
    <circle cx="-1" cy="-9" r="1.5" fill="white" opacity="0.25"/>
    <circle cx="-10" cy="5" r="1.2" fill="white" opacity="0.25"/>
  </g>

  <!-- ════════════════════════════════ -->

  <!-- Midpoint diamond (rendered above food icons) -->
  <g transform="translate(600, 270)" filter="url(#glow)">
    <ellipse cx="0" cy="48" rx="12" ry="5" fill="#000" opacity="0.3"/>
    <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#f59e0b" transform="rotate(45)"/>
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#fbbf24" transform="rotate(45)"/>
  </g>

  <!-- Title -->
  <text x="600" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">
    LetsEatHere
  </text>

  <!-- Tagline -->
  <text x="600" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    a locationally weighted average
  </text>

  <!-- Bottom accent line -->
  <rect x="540" y="510" width="120" height="3" rx="2" fill="#3b82f6" opacity="0.7"/>
</svg>
